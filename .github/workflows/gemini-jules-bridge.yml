name: Gemini → Jules Bridge

# Triggers when any GitHub review is submitted on a PR.
# The job condition filters to: Gemini reviewer + Jules-authored PR only.
on:
  pull_request_review:
    types: [submitted]

jobs:
  bridge:
    name: Forward Gemini violations to Jules
    # Only run when:
    #   1. The review was posted by Gemini Code Assist
    #   2. The PR was authored by Jules
    if: >
      github.event.review.user.login == 'gemini-code-assist[bot]' &&
      contains(github.event.pull_request.user.login, 'jules')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Fetch violations and notify Jules
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const reviewId  = context.payload.review.id;
            const reviewBody = context.payload.review.body || '';

            // Fetch all inline review comments on this PR (max 100 — enough for any review)
            const { data: allComments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100
            });

            // Scope to inline comments that belong to this specific Gemini review
            const violations = allComments.filter(c => c.pull_request_review_id === reviewId);

            if (violations.length === 0) {
              console.log('Gemini review contained no inline violations — skipping Jules notification.');
              return;
            }

            console.log(`Found ${violations.length} inline violation(s) — composing Jules notification.`);

            // ── Build the @jules comment ──────────────────────────────────────────
            const lines = [
              '## Action required: Gemini Code Assist found style guide violations',
              '',
              '@jules — Gemini has reviewed this PR and found the violations listed below.',
              'Please fix each one and push a follow-up commit.',
              'Full rule definitions are in `.gemini/styleguide.md`.',
              ''
            ];

            violations.forEach((v, i) => {
              // Extract rule code from Gemini comment body e.g. **SN-001**, **SEC-002**
              const ruleMatch = v.body.match(/\*\*((?:SEC|JS|SN|TEST|DOC)-\d{3})\*\*/);
              const rule = ruleMatch ? ruleMatch[1] : `Finding ${i + 1}`;

              // Extract inline code suggestion if Gemini provided one
              const suggestionMatch = v.body.match(/```suggestion\n([\s\S]*?)```/);
              const suggestion = suggestionMatch ? suggestionMatch[1].trim() : null;

              // Clean up Gemini's body: strip priority badge img and collapsed <details> block
              const cleanBody = v.body
                .replace(/!\[.*?\]\(https:\/\/www\.gstatic\.com\/.*?\)\n\n/, '')
                .replace(/<details>[\s\S]*?<\/details>/gs, '')
                .trim();

              lines.push(`### ${rule} — \`${v.path}\``);
              if (v.line) lines.push(`> Line ${v.line}`);
              lines.push('');
              lines.push(cleanBody.substring(0, 700));
              if (suggestion) {
                lines.push('');
                lines.push('**Suggested fix:**');
                lines.push('```javascript');
                lines.push(suggestion);
                lines.push('```');
              }
              lines.push('');
            });

            lines.push('---');
            lines.push(
              `*${violations.length} violation(s) detected by Gemini Code Assist and forwarded to Jules. ` +
              'Auto-generated by `gemini-jules-bridge.yml`.*'
            );

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: lines.join('\n')
            });

            console.log(`Jules notified of ${violations.length} violation(s) on PR #${prNumber}.`);

            // ── Update PR labels ──────────────────────────────────────────────────
            // Remove ai-review:pending → add ai-review:violations
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              name: 'ai-review:pending'
            }).catch(() => {});

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['ai-review:violations']
            }).catch(e => console.log('Label warning:', e.message));
