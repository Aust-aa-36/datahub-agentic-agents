name: Deploy to Power Pages

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Sync Source to Deploy Folder
        run: node sync.js

      - name: Install Power Platform Tools
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Upload to Power Pages
        shell: bash
        run: |
          # 1. Create Auth Profile
          $POWERPLATFORMTOOLS_PACPATH auth create --name "GitHubAction" \
            --environment "https://org5223164a.crm6.dynamics.com/" \
            --applicationId "${{ secrets.CLIENT_ID }}" \
            --clientSecret "${{ secrets.CLIENT_SECRET }}" \
            --tenant "${{ secrets.TENANT_ID }}" \
            --accept-cleartext-caching

          # 2. Direct Upload
          $POWERPLATFORMTOOLS_PACPATH pages upload --path "austroads-power-pages-verify2/datahub---datahub" \
            --environment "https://org5223164a.crm6.dynamics.com/" \
            --modelVersion 2
